services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-delorean}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-delorean}
      POSTGRES_DB: ${POSTGRES_DB:-delorean}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-delorean}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
